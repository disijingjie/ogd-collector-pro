name: Auto Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 106.53.188.187
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 30s
          debug: true
          script_stop: true
          script: |
            echo "=== SSH连接成功 ==="
            echo "当前目录: $(pwd)"
            echo "当前用户: $(whoami)"
            cd /opt/ogd-collector-pro || exit 1
            echo "进入项目目录: $(pwd)"
            git status
            echo "=== 拉取最新代码 ==="
            git pull origin main
            echo "=== 重启服务 ==="
            sudo systemctl restart ogd-collector
            sleep 3
            echo "=== 验证服务 ==="
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/v3/)
            echo "HTTP状态码: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功"
            else
              echo "❌ 服务验证失败"
              exit 1
            fi
